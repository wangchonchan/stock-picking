<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票自动选股系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">股票自动选股系统</h1>
        
        <div class="flex flex-wrap gap-4 mb-8 items-center justify-center">
            <div class="flex items-center gap-2">
                <label class="font-medium">选择市场：</label>
                <select id="marketSelect" class="border rounded px-3 py-2 bg-white">
                    <option value="US">美股 (US)</option>
                    <option value="HK">港股 (HK)</option>
                </select>
            </div>
            <button id="screenBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                开始扫描并存储
            </button>
            <div id="loading" class="hidden">
                <div class="loader mr-2"></div>
                <span class="text-gray-600">正在扫描中，请稍候...</span>
            </div>
        </div>

        <div id="statusMsg" class="mb-6 text-center hidden"></div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
            <!-- Section 1: PB < 1 -->
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">PB < 1 (破净股)</h2>
                <div id="sec1_list" class="space-y-2"></div>
            </div>

            <!-- Section 2: RSI < 35 -->
            <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                <h2 class="text-xl font-bold text-green-800 mb-4 border-b border-green-200 pb-2">RSI < 35 (超卖)</h2>
                <div id="sec2_list" class="space-y-2"></div>
            </div>

            <!-- Section 3: RSI > 65 -->
            <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                <h2 class="text-xl font-bold text-red-800 mb-4 border-b border-red-200 pb-2">RSI > 65 (超买)</h2>
                <div id="sec3_list" class="space-y-2"></div>
            </div>
        </div>
        
        <div class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">历史记录</h2>
            <div id="historyList" class="flex flex-wrap gap-2">
                <p class="text-gray-500">暂无历史记录</p>
            </div>
        </div>
    </div>

    <script>
        const screenBtn = document.getElementById('screenBtn');
        const marketSelect = document.getElementById('marketSelect');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const statusMsg = document.getElementById('statusMsg');
        const historyList = document.getElementById('historyList');

        function updateList(containerId, stocks) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (stocks.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic">未找到符合条件的股票</p>';
                return;
            }
            stocks.forEach(s => {
                const div = document.createElement('div');
                div.className = 'bg-white p-2 rounded shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-bold">${s.ticker}</div>
                        <div class="text-xs text-gray-500">${s.name}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-medium">$${s.price ? s.price.toFixed(2) : 'N/A'}</div>
                        <div class="text-xs text-gray-400">PB: ${s.pb ? s.pb.toFixed(2) : 'N/A'} | RSI: ${s.rsi ? s.rsi.toFixed(1) : 'N/A'}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/records');
                const files = await res.json();
                if (files.length > 0) {
                    historyList.innerHTML = '';
                    files.forEach(file => {
                        const btn = document.createElement('button');
                        btn.className = 'bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm';
                        btn.textContent = file;
                        // For now just display the name, could add click to view logic
                        historyList.appendChild(btn);
                    });
                }
            } catch (e) {
                console.error("Failed to load history", e);
            }
        }

        screenBtn.addEventListener('click', async () => {
            const market = marketSelect.value;
            loading.classList.remove('hidden');
            screenBtn.disabled = true;
            results.classList.add('hidden');
            statusMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/screen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ market })
                });
                const result = await res.json();
                
                loading.classList.add('hidden');
                screenBtn.disabled = false;
                
                if (result.success) {
                    statusMsg.textContent = "✅ 扫描完成并已存入 GitHub！";
                    statusMsg.className = "mb-6 text-center text-green-600 font-bold";
                } else {
                    statusMsg.textContent = "⚠️ 扫描完成，但存入 GitHub 失败: " + result.message;
                    statusMsg.className = "mb-6 text-center text-orange-600 font-bold";
                }
                statusMsg.classList.remove('hidden');
                
                updateList('sec1_list', result.data.pb_less_1);
                updateList('sec2_list', result.data.rsi_less_35);
                updateList('sec3_list', result.data.rsi_greater_65);
                results.classList.remove('hidden');
                
                loadHistory();
            } catch (e) {
                loading.classList.add('hidden');
                screenBtn.disabled = false;
                statusMsg.textContent = "❌ 发生错误: " + e.message;
                statusMsg.className = "mb-6 text-center text-red-600 font-bold";
                statusMsg.classList.remove('hidden');
            }
        });

        loadHistory();
    </script>
</body>
</html>
