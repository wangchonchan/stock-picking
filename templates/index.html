<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票自动选股系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">股票自动选股系统</h1>
        
        <div class="flex flex-wrap gap-4 mb-8 items-center justify-center">
            <div class="flex items-center gap-2">
                <label class="font-medium">选择市场：</label>
                <select id="marketSelect" class="border rounded px-3 py-2 bg-white">
                    <option value="US">美股 (US)</option>
                    <option value="HK">港股 (HK)</option>
                </select>
            </div>
            <button id="screenBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                开始扫描
            </button>
            <div id="loading" class="hidden">
                <div class="loader mr-2"></div>
                <span class="text-gray-600">正在扫描中，请稍候...</span>
            </div>
        </div>

        <div id="statusMsg" class="mb-6 text-center hidden"></div>

        <div id="resultsHeader" class="mb-4 text-center hidden">
            <h2 id="resultsTitle" class="text-2xl font-bold text-gray-700"></h2>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                <h2 class="text-xl font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2">PB < 1 (破净股)</h2>
                <div id="sec1_list" class="space-y-2"></div>
            </div>
            <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                <h2 class="text-xl font-bold text-green-800 mb-4 border-b border-green-200 pb-2">RSI < 35 (超卖)</h2>
                <div id="sec2_list" class="space-y-2"></div>
            </div>
            <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                <h2 class="text-xl font-bold text-red-800 mb-4 border-b border-red-200 pb-2">RSI > 65 (超买)</h2>
                <div id="sec3_list" class="space-y-2"></div>
            </div>
        </div>
        
        <div class="mt-12 border-t pt-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">历史扫描记录 (香港时间)</h2>
            <div id="historyList" class="flex flex-wrap gap-2">
                <p class="text-gray-500">正在加载历史记录...</p>
            </div>
        </div>
    </div>

    <script>
        const screenBtn = document.getElementById('screenBtn');
        const marketSelect = document.getElementById('marketSelect');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const resultsHeader = document.getElementById('resultsHeader');
        const resultsTitle = document.getElementById('resultsTitle');
        const statusMsg = document.getElementById('statusMsg');
        const historyList = document.getElementById('historyList');

        function updateUI(data) {
            resultsTitle.textContent = `${data.date} - ${data.market === 'HK' ? '港股' : '美股'} 扫描结果`;
            resultsHeader.classList.remove('hidden');
            updateList('sec1_list', data.pb_less_1);
            updateList('sec2_list', data.rsi_less_35);
            updateList('sec3_list', data.rsi_greater_65);
            results.classList.remove('hidden');
        }

        function updateList(containerId, stocks) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (!stocks || stocks.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic">未找到符合条件的股票</p>';
                return;
            }
            stocks.forEach(s => {
                const div = document.createElement('div');
                div.className = 'bg-white p-2 rounded shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <div class="font-bold">${s.ticker}</div>
                        <div class="text-xs text-gray-500 truncate w-32">${s.name}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-medium">${s.price ? '$' + s.price.toFixed(2) : 'N/A'}</div>
                        <div class="text-xs text-gray-400">PB: ${s.pb ? s.pb.toFixed(2) : 'N/A'} | RSI: ${s.rsi ? s.rsi.toFixed(1) : 'N/A'}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/records');
                const files = await res.json();
                historyList.innerHTML = '';
                if (files.length > 0) {
                    files.forEach(file => {
                        const group = document.createElement('div');
                        group.className = 'flex items-center bg-gray-200 rounded overflow-hidden';
                        
                        const btn = document.createElement('button');
                        btn.className = 'hover:bg-gray-300 px-3 py-1 text-sm transition';
                        const parts = file.split('_');
                        const datePart = parts[0];
                        const timePart = parts[1];
                        const marketPart = parts[2].split('.')[0];
                        const displayDate = `${datePart.substring(4,6)}-${datePart.substring(6,8)} ${timePart.substring(0,2)}:${timePart.substring(2,4)}`;
                        btn.textContent = `${displayDate} (${marketPart})`;
                        btn.onclick = () => loadRecordDetail(file);
                        
                        const delBtn = document.createElement('button');
                        delBtn.className = 'bg-red-100 hover:bg-red-200 text-red-600 px-2 py-1 text-xs font-bold border-l border-gray-300';
                        delBtn.textContent = '×';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            if(confirm('确定删除这条记录吗？')) deleteRecord(file);
                        };
                        
                        group.appendChild(btn);
                        group.appendChild(delBtn);
                        historyList.appendChild(group);
                    });
                } else {
                    historyList.innerHTML = '<p class="text-gray-500">暂无历史记录</p>';
                }
            } catch (e) {
                historyList.innerHTML = '<p class="text-red-500">加载历史记录失败</p>';
            }
        }

        async function deleteRecord(filename) {
            try {
                const res = await fetch(`/api/records/${filename}`, { method: 'DELETE' });
                if (res.ok) loadHistory();
            } catch (e) {
                alert("删除失败: " + e.message);
            }
        }

        async function loadRecordDetail(filename) {
            try {
                const res = await fetch(`/api/records/${filename}`);
                const result = await res.json();
                updateUI(result);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                alert("加载详情失败: " + e.message);
            }
        }

        screenBtn.addEventListener('click', async () => {
            const market = marketSelect.value;
            loading.classList.remove('hidden');
            screenBtn.disabled = true;
            results.classList.add('hidden');
            resultsHeader.classList.add('hidden');
            statusMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/screen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ market })
                });
                const result = await res.json();
                loading.classList.add('hidden');
                screenBtn.disabled = false;
                if (result.success) {
                    updateUI(result.data);
                    loadHistory();
                } else {
                    statusMsg.textContent = "❌ 扫描失败: " + result.message;
                    statusMsg.className = "mb-6 text-center text-red-600 font-bold";
                    statusMsg.classList.remove('hidden');
                }
            } catch (e) {
                loading.classList.add('hidden');
                screenBtn.disabled = false;
                statusMsg.textContent = "❌ 发生错误: " + e.message;
                statusMsg.className = "mb-6 text-center text-red-600 font-bold";
                statusMsg.classList.remove('hidden');
            }
        });

        loadHistory();
    </script>
</body>
</html>
